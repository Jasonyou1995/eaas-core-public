version: '3.8'

services:
  # Main API Gateway
  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: gateway
    image: eaas/gateway:latest
    container_name: eaas-gateway
    restart: unless-stopped
    
    # Security hardening
    user: "1000:1000"
    read_only: true
    security_opt:
      - no-new-privileges:true
      - seccomp:./security/gateway-seccomp.json
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    
    # Networking
    ports:
      - "8080:8080"
    networks:
      - eaas-public
      - eaas-internal
    
    # Environment
    environment:
      - ENV=production
      - PORT=8080
      - WORKERS=2
      - REDIS_URL=redis://redis:6379
      - VAULT_ADDR=http://vault:8200
      - CORS_ORIGINS=https://yourdomain.com,https://app.yourdomain.com
    
    # Tmpfs for writable areas
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    depends_on:
      redis:
        condition: service_healthy
    
    # Mount private plugins (from eaas-plugins-private repo)
    volumes:
      - type: bind
        source: ../../eaas-plugins-private
        target: /app/private
        read_only: true

  # Agent execution runner (scaled horizontally)
  agent-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: agent-runner
    image: eaas/agent-runner:latest
    container_name: eaas-agent-runner
    restart: unless-stopped
    
    # Strict security
    user: "1001:1000"
    read_only: true
    security_opt:
      - no-new-privileges:true
      - seccomp:./security/agent-seccomp.json
    cap_drop:
      - ALL
    
    # Resource limits per agent
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    
    networks:
      - eaas-internal
    
    environment:
      - REDIS_URL=redis://redis:6379
    
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    
    volumes:
      # Mount plugins (read-only)
      - ../sample_plugins:/app/sample_plugins:ro
      - ../../eaas-plugins-private:/app/private:ro
    
    # No ports - internal only
    # Agents communicate via Redis/消息队列
    
    depends_on:
      - redis

  # Redis for caching and queues
  redis:
    image: redis:7-alpine
    container_name: eaas-redis
    restart: unless-stopped
    
    # Security
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    
    networks:
      - eaas-internal
    
    volumes:
      - redis-data:/data
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # HashiCorp Vault for secrets (optional, production)
  vault:
    image: hashicorp/vault:latest
    container_name: eaas-vault
    restart: unless-stopped
    
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=${VAULT_ROOT_TOKEN:-dev-token}
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    
    cap_add:
      - IPC_LOCK
    
    networks:
      - eaas-internal
    
    # Not exposed externally - gateway accesses internally
    # In production, use proper Vault with TLS
    profiles:
      - vault

  # Prometheus for metrics (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: eaas-prometheus
    restart: unless-stopped
    
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    
    networks:
      - eaas-internal
    
    profiles:
      - monitoring

  # Grafana for dashboards (optional)
  grafana:
    image: grafana/grafana:latest
    container_name: eaas-grafana
    restart: unless-stopped
    
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    
    ports:
      - "3000:3000"
    
    volumes:
      - grafana-data:/var/lib/grafana
    
    networks:
      - eaas-public
      - eaas-internal
    
    profiles:
      - monitoring

volumes:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  eaas-public:
    driver: bridge
  eaas-internal:
    driver: bridge
    internal: true  # No external access
